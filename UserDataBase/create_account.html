<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="create_account.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Member Account - BYU PLSA</title>

</head>
<body>

    <h2>Create New Member Profile</h2>

    <div class="form-group">
        <label for="emailInput">Email Address</label>
        <input type="text" id="emailInput" placeholder="student@byu.edu">
    </div>
    
    <div class="form-group">
        <label for="passwordInput">Password (min 6 characters)</label>
        <input type="password" id="passwordInput" placeholder="Choose a secure password">
    </div>
    
    <div class="form-group">
        <label for="nameInput">Full Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Shane Reese">
    </div>
    
    <div class="form-group">
        <label for="roleInput">Member Role</label>
        <select id="roleInput">
            <option value="" disabled selected>Select a role...</option>
            <option value="Student">Student</option>
            <option value="Admin">Admin</option>
            <option value="Officer">Officer</option>
        </select>
    </div>
    
    <button id="createUserBtn">Submit & Create User</button>
    
    <a href="../index.html" class="nav-links">← Back to Homepage</a>
    <script type="module" src="userdatabase.js"></script>

</body>
</html>
